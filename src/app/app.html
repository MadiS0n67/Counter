<div style="display: flex; gap: 50px; padding: 40px; align-items: flex-start;">
  <div style="display: flex; align-items: center; gap: 15px;">
    <button (click)="decrement()">—</button>
    <div style="border: 1px solid black; padding: 10px 50px; min-width: 50px; text-align: center;">
      {{ count }}
    </div>
    <button (click)="increment()">+</button>
  </div>

  <div style="width: 1px; background: black; height: 200px;"></div>

  <div style="display: flex; flex-direction: column; gap: 10px;">
    <div *ngFor="let msg of messages" style="border: 1px solid black; padding: 5px 15px; width: 250px;">
      {{ msg }}
    </div>

    <div style="display: flex; gap: 10px; margin-top: 20px; align-items: center;">
      <input type="text" [(ngModel)]="newMessage" placeholder="input" style="padding: 5px;">
      <button (click)="sendMessage()" style="font-weight: bold; border: none; background: none; cursor: pointer;">Send</button>
    </div>
  </div>
</div>
