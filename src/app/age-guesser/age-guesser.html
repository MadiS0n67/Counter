<div class="container">
  <h3>{{ 'AGE.TITLE' | translate }}</h3>
  <input type="text" [(ngModel)]="userName" [placeholder]="'Wpisz imię...'">
  <button (click)="checkAge()">{{ 'AGE.CHECK' | translate }}</button>

  <p *ngIf="guessedAge !== null">
  {{ 'AGE.RESULT' | translate: { name: searchedName, age: guessedAge } }}
</p>
<p *ngIf="showNotFound">
  {{ 'AGE.NOT_FOUND' | translate: { name: searchedName } }}
</p>
</div>
