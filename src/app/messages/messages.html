<div style="display: flex; flex-direction: column; gap: 10px;">
    <div *ngFor="let msg of messages" style="border: 1px solid black; padding: 5px 15px; width: 250px;">
        {{ msg }}
    </div>

    <div style="display: flex; gap: 10px; margin-top: 20px; align-items: center;">
        <input type="text" [(ngModel)]="newMessage" placeholder="wpisz wiadomość" style="padding: 5px;">
        <button (click)="sendMessage()" style="font-weight: bold; border: none; background: none; cursor: pointer;">Wyślij</button>
        </div>
    </div>
